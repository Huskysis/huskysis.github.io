title: Simple Blog del Husky
description: "A Jekyll Blog Theme For Hackers"
author: 
  name: "Huskysis"
  email: "sth_ws@hotmail.com" #"someone@somewebsite.somedomain"
  url: "https://huskysis.github.io/" #"https://ashishchaudhary.in/hacker-blog"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "Husky"
year : "2019"
