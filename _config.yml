title: Simple Blog del Husky
description: "Consciente, de momento..."
author: 
  name: "Huskysis"
  email: "sth_ws@hotmail.com" 
  url: "https://huskysis.github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 4
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "Husky"
year : "2019"
